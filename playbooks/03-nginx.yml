---
- name: Install and Configure Nginx
  hosts: webserver
  become: yes

  vars_files:
    - ../vars/main.yml

  tasks:

    - name: Install Nginx
      dnf:
        name: nginx
        state: present

    - name: Start and enable Nginx
      service:
        name: nginx
        state: started
        enabled: yes

    - name: Create test index page
      copy:
        dest: "{{ website_root }}/index.html"
        content: |
          <h1>Welcome to {{ domain_name }}</h1>
          <p>Nginx is installed using Ansible.</p>
        owner: "{{ website_user }}"
        group: "{{ website_user }}"
        mode: '0644'
        
    - name: Create Nginx site configuration
      template:
        src: ../templates/nginx-site.conf.j2
        dest: /etc/nginx/conf.d/adarshps.online.conf
        owner: root
        group: root
        mode: '0644'

    - name: Restart Nginx
      service:
        name: nginx
        state: restarted
