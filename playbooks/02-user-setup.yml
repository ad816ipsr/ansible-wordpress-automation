---
- name: Create Website User and Directory
  hosts: webserver
  become: yes

  vars_files:
    - ../vars/main.yml

  tasks:

    - name: Create website user
      user:
        name: "{{ website_user }}"
        home: "/home/{{ website_user }}"
        shell: /bin/bash
        create_home: yes

    - name: Set website user home directory permissions
      file:
        path: "/home/{{ website_user }}"
        state: directory
        owner: "{{ website_user }}"
        group: "{{ website_user }}"
        mode: '0755'

    - name: Create website directory
      file:
        path: "/home/{{ website_user }}/{{ website_name }}"
        state: directory
        owner: "{{ website_user }}"
        group: "{{ website_user }}"
        mode: '0755'

    - name: Create public directory
      file:
        path: "{{ website_root }}"
        state: directory
        owner: "{{ website_user }}"
        group: "{{ website_user }}"
        mode: '0755'
