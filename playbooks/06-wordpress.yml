---
- name: Install WordPress
  hosts: webserver
  become: yes

  vars_files:
    - ../vars/main.yml

  tasks:

    - name: Download WordPress
      get_url:
        url: https://wordpress.org/latest.tar.gz
        dest: /tmp/wordpress.tar.gz

    - name: Extract WordPress
      unarchive:
        src: /tmp/wordpress.tar.gz
        dest: /tmp
        remote_src: yes

    - name: Copy WordPress files to website root
      copy:
        src: /tmp/wordpress/
        dest: "{{ website_root }}/"
        remote_src: yes
        owner: "{{ website_user }}"
        group: "{{ website_user }}"
        mode: preserve

    - name: Create wp-config.php
      template:
        src: ../templates/wp-config.php.j2
        dest: "{{ website_root }}/wp-config.php"
        owner: "{{ website_user }}"
        group: "{{ website_user }}"
        mode: '0644'

    - name: Install WP-CLI
      get_url:
        url: https://raw.githubusercontent.com/wp-cli/builds/gh-pages/phar/wp-cli.phar
        dest: /usr/local/bin/wp
        mode: '0755'

    - name: Check if WordPress is already installed
      command: wp core is-installed --path={{ website_root }} --allow-root
      register: wp_installed
      failed_when: false
      changed_when: false

    - name: Install WordPress automatically
      command: >
        wp core install
        --path={{ website_root }}
        --url=https://{{ domain_name }}
        --title="{{ wordpress_site_title }}"
        --admin_user={{ wordpress_admin_user }}
        --admin_password={{ wordpress_admin_password }}
        --admin_email={{ wordpress_admin_email }}
        --allow-root
      when: wp_installed.rc != 0

    - name: Set WordPress ownership
      file:
        path: "{{ website_root }}"
        owner: "{{ website_user }}"
        group: "{{ website_user }}"
        recurse: yes

    - name: Restart PHP-FPM
      service:
        name: php-fpm
        state: restarted

    - name: Restart Nginx
      service:
        name: nginx
        state: restarted
